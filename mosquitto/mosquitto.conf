# ─────────────────────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration for GrainHero
# ─────────────────────────────────────────────────────────────

# Listen on default MQTT port
listener 1883

# Allow anonymous connections (for development/demo)
# For production: set to false and configure password_file
allow_anonymous true

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true
log_timestamp true
